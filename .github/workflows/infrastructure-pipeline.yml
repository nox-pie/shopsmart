# Aligns with college rubric: Phase 1 tests + reports → Terraform (S3 + ECS) → Docker/ECR → ECS verify.
# Full apply/push/deploy runs on main (and manual dispatch) only; PRs run tests + reports.
name: Infrastructure pipeline (rubric)

permissions:
  contents: read
  actions: write

on:
  pull_request:
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: infra-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Phase 1 — Tests & reports
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Client — install & test report
        working-directory: ./client
        run: |
          npm ci
          npm run test:report

      - name: Server — install & test report
        working-directory: ./server
        run: |
          npm ci
          npm run test:report

      - name: Upload test reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-reports
          path: |
            client/test-results
            server/test-results
          retention-days: 14

  terraform:
    name: Phase 2 — Terraform (S3 + ECS)
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: terraform
    outputs:
      ecr_url: ${{ steps.tfout.outputs.ecr_url }}
      ecs_cluster: ${{ steps.tfout.outputs.ecs_cluster }}
      ecs_service: ${{ steps.tfout.outputs.ecs_service }}
    env:
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_enable_ecs: "true"
      TF_VAR_ecs_task_execution_role_arn: ${{ secrets.ECS_TASK_EXECUTION_ROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Terraform state
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: terraform/terraform.tfstate
          key: shopsmart-terraform-tfstate-main-v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Reconcile pre-existing ECS resources into state
        run: |
          set -euo pipefail
          SUFFIX="$(terraform state show random_id.bucket_suffix | awk '/hex =/ {gsub(/"/, "", $3); print $3}')"
          if [ -z "${SUFFIX}" ]; then
            echo "Could not resolve random suffix from state."
            exit 1
          fi

          ECR_REPO="shopsmart-app-${SUFFIX}"
          LOG_GROUP="/ecs/shopsmart-${SUFFIX}"

          if ! terraform state list | rg "^aws_ecr_repository\\.app\\[0\\]$" >/dev/null; then
            if aws ecr describe-repositories --repository-names "${ECR_REPO}" --region "${{ secrets.AWS_REGION }}" >/dev/null 2>&1; then
              terraform import "aws_ecr_repository.app[0]" "${ECR_REPO}"
            fi
          fi

          if ! terraform state list | rg "^aws_cloudwatch_log_group\\.ecs\\[0\\]$" >/dev/null; then
            if aws logs describe-log-groups --log-group-name-prefix "${LOG_GROUP}" --region "${{ secrets.AWS_REGION }}" --query "logGroups[?logGroupName=='${LOG_GROUP}'].logGroupName" --output text | rg "^${LOG_GROUP}$" >/dev/null; then
              terraform import "aws_cloudwatch_log_group.ecs[0]" "${LOG_GROUP}"
            fi
          fi

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Export outputs
        id: tfout
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_service=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"

  docker-ecs:
    name: Phase 3 — Docker, ECR, ECS
    needs: terraform
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ECS_CLUSTER: ${{ needs.terraform.outputs.ecs_cluster }}
      ECS_SERVICE: ${{ needs.terraform.outputs.ecs_service }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Resolve ECR repository URL
        run: |
          set -eux
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          SUFFIX="$(echo "${ECS_SERVICE}" | sed -E 's/^.*-svc-//')"
          ECR_URL="${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/shopsmart-app-${SUFFIX}"
          echo "ECR_URL=${ECR_URL}" >> "$GITHUB_ENV"

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -eux
          docker build -t "${ECR_URL}:${IMAGE_TAG}" -t "${ECR_URL}:latest" .
          docker push "${ECR_URL}:${IMAGE_TAG}"
          docker push "${ECR_URL}:latest"

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment \
            --region "${{ secrets.AWS_REGION }}"

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --region "${{ secrets.AWS_REGION }}"
