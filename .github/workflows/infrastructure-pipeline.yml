# Rubric workflow order: Push/PR → Tests → Terraform → Docker build & push → ECS Fargate → verify
# Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_REGION
# Vocareum (voc-cancel-cred): set repository Variable SKIP_AWS_CREATES=true — Terraform applies with zero AWS creates; Phase 3 jobs are skipped.
name: Infrastructure pipeline (rubric)

permissions:
  contents: read
  actions: write

on:
  pull_request:
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: infra-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: shopsmart
  TF_WORKING_DIR: terraform

jobs:
  test:
    name: Phase 1 — Tests & reports
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Client — install & test report
        working-directory: ./client
        run: |
          npm ci
          npm run test:report

      - name: Server — install & test report
        working-directory: ./server
        run: |
          npm ci
          npm run test:report

      - name: Upload test reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-reports
          path: |
            client/test-results
            server/test-results
          retention-days: 14

  terraform:
    name: Phase 2 — Terraform (S3 + VPC + ECR + ECS)
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: terraform
    outputs:
      ecr_url: ${{ steps.tfout.outputs.ecr_url }}
      ecs_cluster: ${{ steps.tfout.outputs.ecs_cluster }}
      ecs_service: ${{ steps.tfout.outputs.ecs_service }}
      alb_dns: ${{ steps.tfout.outputs.alb_dns }}
      skip_phase3: ${{ steps.phase3_gate.outputs.skip }}
    env:
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_enable_s3: "true"
      TF_VAR_enable_ecs: "true"
      # Variable or secret SKIP_AWS_CREATES=true when voc-cancel-cred denies infrastructure creates (see README).
      TF_VAR_skip_aws_creates: "${{ (vars.SKIP_AWS_CREATES == 'true' || secrets.SKIP_AWS_CREATES == 'true') && 'true' || 'false' }}"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Gate Phase 3 jobs (secrets/vars cannot be used in job-level `if:` for docker-build / deploy-ecs).
      - name: Phase 3 gate (SKIP_AWS_CREATES)
        id: phase3_gate
        run: |
          if [ "${{ vars.SKIP_AWS_CREATES }}" = "true" ] || [ "${{ secrets.SKIP_AWS_CREATES }}" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Terraform state (local backend)
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: terraform/terraform.tfstate
          key: shopsmart-terraform-tfstate-main-v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      # Init must run before fmt/validate/plan (local backend; no partial S3 backend in versions.tf).
      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Reconcile pre-existing resources into state (best effort)
        run: |
          set -euo pipefail
          SUFFIX=""
          if terraform state list 2>/dev/null | grep -qE '^random_id\.bucket_suffix(\[0\])?$'; then
            RS="$(terraform state list 2>/dev/null | grep -E '^random_id\.bucket_suffix(\[0\])?$' | head -1)"
            SUFFIX="$(terraform state show "${RS}" | awk '/hex =/ {gsub(/"/, "", $3); print $3}' || true)"
          fi
          if [ -z "${SUFFIX}" ] && terraform state list 2>/dev/null | grep -qE '^aws_s3_bucket\.artifacts(\[0\])?$'; then
            BS="$(terraform state list 2>/dev/null | grep -E '^aws_s3_bucket\.artifacts(\[0\])?$' | head -1)"
            BUCKET_NAME="$(terraform state show "${BS}" | awk '/bucket =/ {gsub(/"/, "", $3); print $3}' || true)"
            SUFFIX="$(echo "${BUCKET_NAME}" | sed -E 's/^shopsmart-artifacts-//' || true)"
          fi
          if [ -n "${SUFFIX}" ]; then
            ECR_REPO="shopsmart-app-${SUFFIX}"
            LOG_GROUP="/ecs/shopsmart-${SUFFIX}"
            ECS_CLUSTER_NAME="shopsmart-cluster-${SUFFIX}"
            ECS_SERVICE_NAME="shopsmart-svc-${SUFFIX}"
          else
            ECR_REPO=""
            LOG_GROUP=""
            ECS_CLUSTER_NAME=""
            ECS_SERVICE_NAME=""
          fi
          if [ -n "${ECR_REPO}" ] && [ "${ECR_REPO}" != "None" ]; then
            terraform import "aws_ecr_repository.app[0]" "${ECR_REPO}" >/dev/null 2>&1 || true
          fi
          if [ -n "${LOG_GROUP}" ] && [ "${LOG_GROUP}" != "None" ]; then
            terraform import "aws_cloudwatch_log_group.ecs[0]" "${LOG_GROUP}" >/dev/null 2>&1 || true
          fi
          if [ -n "${ECS_CLUSTER_NAME}" ] && [ "${ECS_CLUSTER_NAME}" != "None" ]; then
            terraform import "aws_ecs_cluster.main[0]" "${ECS_CLUSTER_NAME}" >/dev/null 2>&1 || true
          fi
          if [ -n "${ECS_CLUSTER_NAME}" ] && [ -n "${ECS_SERVICE_NAME}" ]; then
            terraform import "aws_ecs_service.app[0]" "${ECS_CLUSTER_NAME}/${ECS_SERVICE_NAME}" >/dev/null 2>&1 || true
          fi

      # Labs may deny S3 read APIs on refresh; plan uses cached state.
      - name: Terraform plan
        run: terraform plan -refresh=false -input=false -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Export outputs
        id: tfout
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          terraform output -json > tf_outputs.json
          # Avoid GitHub masking dropping outputs that embed the region secret (see sai deploy-pipeline).
          ECR_URL="$(jq -r '.ecr_repository_url.value' tf_outputs.json | sed "s/${AWS_REGION}/REGION_PLACEHOLDER/g")"
          ALB_DNS="$(jq -r '.alb_dns_name.value' tf_outputs.json | sed "s/${AWS_REGION}/REGION_PLACEHOLDER/g")"
          echo "ecr_url=${ECR_URL}" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster=$(jq -r '.ecs_cluster_name.value' tf_outputs.json)" >> "$GITHUB_OUTPUT"
          echo "ecs_service=$(jq -r '.ecs_service_name.value' tf_outputs.json)" >> "$GITHUB_OUTPUT"
          echo "alb_dns=${ALB_DNS}" >> "$GITHUB_OUTPUT"

  docker-build:
    name: Phase 3 — Docker build & push (ECR)
    needs: terraform
    if: >-
      github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.terraform.outputs.skip_phase3 != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Build and push image
        env:
          RAW_ECR_URL: ${{ needs.terraform.outputs.ecr_url }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euxo pipefail
          ECR_URL="${RAW_ECR_URL//REGION_PLACEHOLDER/$AWS_REGION}"
          if [ -z "${ECR_URL}" ]; then
            echo "Terraform did not pass ecr_repository_url."
            exit 1
          fi
          docker build -t "${ECR_URL}:${IMAGE_TAG}" -t "${ECR_URL}:latest" .
          docker push "${ECR_URL}:${IMAGE_TAG}"
          docker push "${ECR_URL}:latest"

  deploy-ecs:
    name: Phase 3 — ECS Fargate deploy & verify
    needs: [terraform, docker-build]
    if: >-
      github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.terraform.outputs.skip_phase3 != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Force new ECS deployment
        env:
          ECS_CLUSTER: ${{ needs.terraform.outputs.ecs_cluster }}
          ECS_SERVICE: ${{ needs.terraform.outputs.ecs_service }}
        run: |
          set -euxo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment \
            --region "${AWS_REGION}"

      - name: Wait for ECS service stability
        env:
          ECS_CLUSTER: ${{ needs.terraform.outputs.ecs_cluster }}
          ECS_SERVICE: ${{ needs.terraform.outputs.ecs_service }}
        run: |
          set -euxo pipefail
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --region "${AWS_REGION}"

      - name: Verify deployment (ALB health)
        env:
          RAW_ALB_DNS: ${{ needs.terraform.outputs.alb_dns }}
        run: |
          set -euxo pipefail
          ALB_DNS="${RAW_ALB_DNS//REGION_PLACEHOLDER/$AWS_REGION}"
          echo "ALB: http://${ALB_DNS}"
          sleep 15
          curl -sfS --retry 5 --retry-delay 10 "http://${ALB_DNS}/api/health"
          echo ""
          echo "Health check passed."
