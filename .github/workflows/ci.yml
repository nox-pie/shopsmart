name: CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  client:
    name: Build Client (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    defaults:
      run:
        working-directory: ./client
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Say Hello
        run: echo "👋 Hello GitHub Actions!"
      
      - name: Show Context Info
        run: |
          echo "🔹 Repository: ${{ github.repository }}"
          echo "🔹 Branch: ${{ github.ref_name }}"
          echo "🔹 Commit: ${{ github.sha }}"
          echo "🔹 Actor: ${{ github.actor }}"
          echo "🔹 Event: ${{ github.event_name }}"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npm run test
      
      - name: Check formatting
        run: npm run format:check || echo "Formatting check failed but proceeding for now"
        
      - name: Check Linting
        run: npm run lint
      
      - name: Build client
        run: npm run build

  server:
    name: Build Server (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    defaults:
      run:
        working-directory: ./server
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Say Hello
        run: echo "👋 Hello GitHub Actions!"
      
      - name: Show Context Info
        run: |
          echo "🔹 Repository: ${{ github.repository }}"
          echo "🔹 Branch: ${{ github.ref_name }}"
          echo "🔹 Commit: ${{ github.sha }}"
          echo "🔹 Actor: ${{ github.actor }}"
          echo "🔹 Event: ${{ github.event_name }}"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Run tests
        run: npm run test
      
      - name: Check formatting
        run: npm run format:check || echo "Formatting check failed but proceeding for now"
        
      - name: Check Linting
        run: npm run lint
      
      - name: Verify server setup
        run: node --version && npm --version
