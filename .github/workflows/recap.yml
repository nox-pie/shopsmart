name: Weekly recap (manual demo)

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Name'
        required: true
        default: 'DevOps Engineer'
      environment: 
        description: 'Environment'
        required: true
        default: 'Production'

jobs:
  recap-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps: 
      - name: Send status recap
        run: echo "Hello ${{ github.event.inputs.name }}, the ${{ github.event.inputs.environment }} environment recap has been triggered!"
      
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        
      - name: List Files after checkout
        run: ls -la
