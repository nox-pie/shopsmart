name: Variables Secrets and Artifacts

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:

env:
  GLOBAL_VAR: "Global Level Variable"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      JOB_VAR: "Job Level Variable"
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./client
        run: npm ci

      - name: Build Application
        working-directory: ./client
        run: npm run build
        env:
          # Must match client/src/api/api.js (VITE_API_URL), not VITE_APP_API_URL
          VITE_API_URL: ${{ vars.API_URL || 'http://localhost:5001' }}

      - name: Use Variables and Secrets
        run: |
          echo "Global Var: $GLOBAL_VAR"
          echo "Job Var: $JOB_VAR"
          echo "Step Var: $STEP_VAR"
          echo "Repo Var: ${{ vars.REPO_VAR }}"
        env:
          STEP_VAR: "Step Level Variable"

      - name: Upload Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: client-build
          path: ./client/dist
          retention-days: 1

  download-and-verify:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: client-build
          path: ./downloaded-client

      - name: Verify Artifact Content
        run: |
          ls -R ./downloaded-client
