name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2. Initiating idempotent deployment..."
            
            # Ensure the structure exists
            mkdir -p ~/shopsmart
            cd ~/shopsmart
            
            # This triggers the idempotent script already pulled to the server
            # Alternatively, running it raw here if the script itself does the pulling:
            bash scripts/deploy.sh
